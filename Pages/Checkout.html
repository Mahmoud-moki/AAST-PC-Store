  <link rel="stylesheet" href="./../css/bootstrap.css">
</head>
<body>
  <nav class="navbar sticky-top top-0 navbar-expand-lg bg-body-tertiary">
    <div class="container">
        <a class="navbar-brand fs-3" href="#">Store</a>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" href="./../index.Html">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="./Feedback.html">Feedback</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="./contact.html">Contact Us</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="./About-us.html">About Us</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="./Cart.html"><i class="bi bi-bag fw-bold fs-5"></i></a>
                </li>
            </ul>
            <div class="ms-4">
              <input class="switch" id="themeToggle"  type="checkbox">
            </div>
        </div>
    </div>
</nav>


<section class="container py-5">
  <div class="row g-4 align-items-center">
    <div class="col-lg-7">
      <h2 class="mb-4">Billing & Shipping Details</h2>
      <form action="./../Pages/Payment.html">
        <div class="row g-3">
          <div class="col-md-6">
            <label for="firstName" class="form-label">First Name</label>
            <input type="text" class="form-control" id="firstName" required>
          </div>
          <div class="col-md-6">
            <label for="lastName" class="form-label">Last Name</label>
            <input type="text" class="form-control" id="lastName" required>
          </div>
          <div class="col-12">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" placeholder="you@example.com" required>
          </div>
          <div class="col-12">
            <label for="address" class="form-label">Address</label>
            <input type="text" class="form-control" id="address" placeholder="1234 Main St" required>
          </div>
          <div class="col-md-12">
            <label for="city" class="form-label">City</label>
            <input type="text" class="form-control" id="city" required>
          </div>
          <div class="col-12 mt-3">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="sameAddress">
              <label class="form-check-label" for="sameAddress">
                Agree to terms and services
              </label>
            </div>
          </div>
          <div class="col-12 mt-4">
            <button type="submit" class="btn btn-primary btn-lg w-100">Proceed to Payment</button>
          </div>
        </div>
      </form>
    </div>
    <div class="col-lg-5 text-center">
      <img src="./../IMG/pc-1-1-1.png" class="img-fluid rounded" alt="PC Image">
    </div>
  </div>
</section>
<section class=" bottom-0">
  <footer class="bg-body-secondary">
    <div class="container p-4">
      <div class="row justify-content-between">
        <div class="col-lg-6 col-md-12 mb-4 mb-md-0">
          <h5 class="text-uppercase">Our Store</h5>

          <p class="text-start">
              We sell reliable, high-performance PCs with honest advice, fair prices, and support you can trust.
          </p>
        </div>
        <div class="col-lg-3 col-md-6 mb-4 mb-md-0">
          <h5 class="text-uppercase mb-0">Pages</h5>

          <ul class="list-unstyled">
            <li>
              <a href="#! " class="text-body text-decoration-none">About Us</a>
            </li>
            <li>
              <a href="#! " class="text-body text-decoration-none">Feedback</a>
            </li>
            <li>
              <a href="#! " class="text-body text-decoration-none">Products</a>
            </li>
            <li>
              <a href="#! " class="text-body text-decoration-none">Contact Us</a>
            </li>
          </ul>
        </div>
      </div>
  </footer>
</section>
  <script src="./../JS/Util.js"></script>
</body>
</html>
