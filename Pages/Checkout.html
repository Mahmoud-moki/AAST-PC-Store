<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout</title>

    <link rel="stylesheet" href="./../css/bootstrap.css" />
    <link rel="stylesheet" href="./../css/Style.css" />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
  </head>

  <body>
    <!-- NAVBAR -->
    <nav class="navbar sticky-top navbar-expand-lg bg-body-tertiary">
      <div class="container">
        <a class="navbar-brand fs-3" href="./../index.html">Store</a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#nav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="nav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="./../index.html">Home</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="./Feedback.html">Feedback</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="./contact.html">Contact Us</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="./About-us.html">About Us</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="./Cart.html">
                <i class="bi bi-bag fs-5"></i>
              </a>
            </li>
          </ul>

          <div class="ms-3">
            <input class="switch" id="themeToggle" type="checkbox" />
          </div>

          <div class="ms-3">
            <a class="nav-link text-danger" href="./Login.html">
              <i class="bi bi-box-arrow-right"></i>
            </a>
          </div>
        </div>
      </div>
    </nav>

    <!-- CHECKOUT FORM -->
    <section class="container py-5">
      <div class="row g-4">
        <!-- FORM -->
        <div class="col-lg-7">
          <h2 class="mb-4">Billing & Shipping Details</h2>

          <form id="checkoutForm">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">First Name</label>
                <input
                  type="text"
                  id="firstName"
                  class="form-control"
                  required
                />
              </div>

              <div class="col-md-6">
                <label class="form-label">Last Name</label>
                <input
                  type="text"
                  id="lastName"
                  class="form-control"
                  required
                />
              </div>

              <div class="col-12">
                <label class="form-label">Email</label>
                <input type="email" id="email" class="form-control" required />
              </div>

              <div class="col-12">
                <label class="form-label">Address</label>
                <input type="text" id="address" class="form-control" required />
              </div>

              <div class="col-12">
                <label class="form-label">City</label>
                <input type="text" id="city" class="form-control" required />
              </div>

              <div class="col-12">
                <div class="form-check">
                  <input
                    class="form-check-input"
                    type="checkbox"
                    id="terms"
                    required
                  />
                  <label class="form-check-label">
                    I agree to the terms and conditions
                  </label>
                </div>
              </div>

              <div class="col-12 mt-3">
                <button type="submit" class="btn btn-primary w-100 btn-lg">
                  Proceed to Payment
                </button>
              </div>
            </div>
          </form>
        </div>

        <!-- IMAGE -->
        <div class="col-lg-5 text-center">
          <img src="./../IMG/pc-1-1-1.png" class="img-fluid rounded" alt="PC" />
        </div>
      </div>
    </section>

    <!-- FOOTER -->
    <footer class="bg-body-secondary mt-5">
      <div class="container p-4">
        <div class="row justify-content-between">
          <div class="col-lg-6">
            <h5>Our Store</h5>
            <p>
              We sell reliable, high-performance PCs with honest advice and fair
              prices.
            </p>
          </div>

          <div class="col-lg-3">
            <h5>Pages</h5>
            <ul class="list-unstyled">
              <li>
                <a href="./About-us.html" class="text-decoration-none"
                  >About Us</a
                >
              </li>
              <li>
                <a href="./Feedback.html" class="text-decoration-none"
                  >Feedback</a
                >
              </li>
              <li>
                <a href="./../index.html" class="text-decoration-none"
                  >Products</a
                >
              </li>
              <li>
                <a href="./contact.html" class="text-decoration-none"
                  >Contact</a
                >
              </li>
            </ul>
          </div>
        </div>
      </div>
    </footer>

    <!-- SCRIPTS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./../JS/Util.js"></script>
  </body>
</html>
