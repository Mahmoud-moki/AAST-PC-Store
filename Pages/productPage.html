            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarSupportedContent">

            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">

                <li class="nav-item">
                    <a class="nav-link" href="./../index.html">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="./Feedback.html">Feedback</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="./contact.html">Contact Us</a>

                    <i class="bi bi-box-arrow-right h5 text-danger fw-bold"></i>

      <div class="row align-items-center">
        <div class="col-lg-6 text-center mb-4">
          <img id="productImage" class="img-fluid rounded w-75" />
        </div>

        <div class="col-lg-6">
          <h1 id="ProductTitle" class="display-5 fw-bold"></h1>

          <p id="ProductInfo" class="lead text-muted"></p>

          <h2 id="ProductPrice" class="fw-bold text-primary mb-4"></h2>

          <button

            onclick="showCartPopup()"

            Add to Cart
          </button>

      </div>
